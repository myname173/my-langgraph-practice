
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>我的 AI 助手 - LangGraph</title>
    <style>
        body { font-family: Arial; margin: 0; padding: 20px; background: #f5f5f5; }
        .chat-container { max-width: 800px; margin: 0 auto; background: white; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .chat-box { height: 70vh; overflow-y: auto; padding: 20px; border-bottom: 1px solid #eee; }
        .message { margin: 15px 0; padding: 12px 16px; border-radius: 18px; max-width: 80%; }
        .user { background: #0084ff; color: white; align-self: flex-end; margin-left: auto; border-bottom-right-radius: 4px; }
        .ai { background: #e5e5ea; color: black; align-self: flex-start; border-bottom-left-radius: 4px; }
        .input-area { padding: 20px; display: flex; gap: 10px; }
        input { flex: 1; padding: 14px; border: 1px solid #ddd; border-radius: 25px; font-size: 16px; }
        button { padding: 14px 28px; background: #0084ff; color: white; border: none; border-radius: 25px; cursor: pointer; }
        button:hover { background: #0066cc; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-box" id="chatBox"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="输入消息..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        function addMessage(text, type) {
            const chatBox = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            input.value = '';

            const response = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: message})
            });

            const data = await response.json();
            addMessage(data.reply, 'ai');
        }
    </script>
</body>
</html>
